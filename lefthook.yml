pre-commit:
  parallel: false
  commands:
    prettier:
      exclude:
        - CLAUDE.md
      glob: '*.{json,md,yml}'
      run: npx --no prettier -- --write {staged_files} && git add {staged_files}
    oxlint:
      glob: 'src/**/*.ts'
      run: npx --no oxlint -- --fix {staged_files} && git add {staged_files}
