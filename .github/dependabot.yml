updates:
  - assignees:
      - ffflorian
    commit-message:
      prefix: fix(deps)
    cooldown:
      default-days: 5
      exclude:
        - node
        - nginx
    directory: /
    ignore:
      - dependency-name: node
        versions:
          - '> 26'
    open-pull-requests-limit: 99
    package-ecosystem: docker
    schedule:
      interval: weekly
  - assignees:
      - ffflorian
    commit-message:
      prefix: fix(deps)
      prefix-development: chore(deps-dev)
    cooldown:
      default-days: 5
      exclude:
        - '@ffflorian/*'
    directory: /
    groups:
      react:
        patterns:
          - react*
    ignore:
      # see https://github.com/jsx-eslint/eslint-plugin-react/issues/3977
      - dependency-name: eslint
        versions:
          - '> 9'
    open-pull-requests-limit: 99
    package-ecosystem: npm
    schedule:
      interval: weekly
    versioning-strategy: increase
  - assignees:
      - ffflorian
    commit-message:
      prefix: ci(deps)
    cooldown:
      default-days: 5
      exclude:
        - ffflorian/*
    directory: /
    open-pull-requests-limit: 99
    package-ecosystem: github-actions
    schedule:
      interval: weekly
version: 2
