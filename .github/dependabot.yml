version: 2
updates:
  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: node
        versions:
          - '> 26'
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    versioning-strategy: increase
    groups:
      react:
        patterns:
          - 'react*'
          - 'react-dom*'
    ignore:
      # see https://github.com/jsx-eslint/eslint-plugin-react/issues/3977
      - dependency-name: 'eslint'
        versions:
          - '>= 10'
    cooldown:
      default-days: 5
      exclude:
        - '@ffflorian/*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    cooldown:
      default-days: 5
      exclude:
        - 'ffflorian/*'
