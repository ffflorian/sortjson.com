name: Lint, test, and publish

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint_test_typescript:
    name: Lint and test TypeScript
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 26
          cache: yarn

      - name: Install dependencies
        run: yarn --immutable

      - name: Lint
        run: |
          yarn lint
          yarn test
          yarn build

  test_nginx_config:
    name: Test nginx config
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: nginx:1.31.0-alpine@sha256:c22e76a97fe5bacad9d58bad0a96e903480c05f8dee30884b14550530ddd25a9
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Generate and validate nginx config
        run: |
          cp nginx.conf /etc/nginx/conf.d/default.conf
          nginx -t

  lint_dockerfile:
    name: Lint Dockerfile
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5

  build_dockerfile:
    name: Build Docker image
    needs: lint_test_typescript
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: false

  publish:
    name: Publish Release and Docker image
    needs:
      - test_nginx_config
      - lint_dockerfile
      - build_dockerfile
    permissions:
      contents: write
      packages: write
      issues: write
    outputs:
      new_release_published: ${{ steps.publish_release.outputs.new_release_published }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Publish Release and Docker image
        id: publish_release
        uses: ffflorian/actions/docker-image-release@9c7842ec0251a5890f0ca9ef22deed8dbc4ea9fa
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_author: 'ffflorian'
          git_email: 'git@ffflorian.de'

  # Deploy is part of this workflow because GitHub does not fire release events
  # when a release is created by a workflow using GITHUB_TOKEN, so a separate
  # deploy.yml listening on release:published would never be triggered.
  deploy:
    name: Deploy latest image
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.publish.result == 'success' && needs.publish.outputs.new_release_published == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    steps:
      - name: Deploy
        uses: ffflorian/actions/coolify-deploy@9c7842ec0251a5890f0ca9ef22deed8dbc4ea9fa
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          domain: ${{ secrets.COOLIFY_DOMAIN }}
          token: ${{ secrets.COOLIFY_TOKEN }}
          uuid: ${{ secrets.COOLIFY_UUID }}
