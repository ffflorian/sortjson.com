name: Lint, test, and publish

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint_test_typescript:
    name: Lint and test TypeScript
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 26
          cache: yarn

      - name: Install dependencies
        run: yarn --immutable

      - name: Lint
        run: |
          yarn lint
          yarn test
          yarn build

  test_nginx_config:
    name: Test nginx config
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: nginx:1.31.0-alpine@sha256:c22e76a97fe5bacad9d58bad0a96e903480c05f8dee30884b14550530ddd25a9
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate and validate nginx config
        run: |
          cp nginx.conf /etc/nginx/conf.d/default.conf
          nginx -t

  lint_dockerfile:
    name: Lint Dockerfile
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5

  publish:
    name: Publish Release and Docker image
    needs:
      - test_nginx_config
      - lint_dockerfile
      - lint_test_typescript
    permissions:
      contents: write
      packages: write
      issues: write
    outputs:
      new_release_published: ${{ steps.publish_release.outputs.new_release_published }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Publish Release and Docker image
        id: publish_release
        uses: ffflorian/actions/docker-image-release@0e923e3b523cf45d86089fc365ab9414bb609e20
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_author: 'ffflorian'
          git_email: 'git@ffflorian.de'

  deploy:
    name: Deploy latest image
    runs-on: ubuntu-latest
    needs: publish
    if: |
      github.event_name == 'workflow_dispatch' ||
      (needs.publish.outputs.new_release_published == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions: {}
    steps:
      - name: Deploy
        uses: ffflorian/actions/coolify-deploy@0e923e3b523cf45d86089fc365ab9414bb609e20
        with:
          domain: ${{ secrets.COOLIFY_DOMAIN }}
          token: ${{ secrets.COOLIFY_TOKEN }}
          uuid: ${{ secrets.COOLIFY_UUID }}
