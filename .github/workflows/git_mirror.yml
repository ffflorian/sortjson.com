name: Mirror to Codeberg and GitLab

permissions: {}

on:
  push:
    branches: [main]

jobs:
  mirror:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/git-mirror@9c7842ec0251a5890f0ca9ef22deed8dbc4ea9fa
        with:
          GITLAB_REMOTE: 'git@gitlab.com:ffflorian/sortjson.com.git'
          GITLAB_SECRET: ${{ secrets.GITLAB_SECRET }}
          GITLAB_PUSH_ALL_REFS: 'false'
          CODEBERG_REMOTE: 'git@codeberg.org:ffflorian/sortjson.com.git'
          CODEBERG_SECRET: ${{ secrets.CODEBERG_SECRET }}
          CODEBERG_PUSH_ALL_REFS: 'false'
