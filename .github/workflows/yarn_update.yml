name: Check for yarn updates

permissions: {}

on:
  schedule:
    - cron: '0 5 1 * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/yarn_update.yml'
  workflow_dispatch:

jobs:
  yarn-update-check:
    name: Yarn update check
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Update yarn
        uses: ffflorian/actions/yarn-update@bac55801ce13998bfa3e797f210c418e509a519e
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_authorship: 'Florian Imdahl <git@ffflorian.de>'
          release_cooldown_days: '5'
          assignees: 'ffflorian'
